<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Doremon </title>
    <style>
        .Doremon{
            width: 200px;
            height: 400px;
            position: relative;
            margin: 50px auto;
        }
        .Face{
    width: 284px;
    height: 311px;
            background-color: #2e6dec;
            border-radius: 50%;
            position: relative;
        }
      
        .Eyes{
            width: 50px;
            height: 50px;
            background-color: white;
            border-radius: 50%;
            position: relative;
            top: 50px;
            left: 30px;
        }
        .LeftEyes{
            width: 65px;
            height: 65px;
            background-color: white;
            border-radius: 50%;
            border: black solid ;
            top: -291px;
            left: 70px;
            position: relative;
        }
        .RightEyes{
            width: 65px;
            height: 65px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            left: 140px;
            border: black solid ;
        }
        .Nose{
    width: 45px;
    height: 45px;
    background-color: #e83503;
    border-radius: 50%;
    position: absolute;
    top: 77px;
    left: 116px;
    border: black   solid ;
        }

       

          .WhiteFace{
            
    width: 245px;
    height: 260px;
    background-color: white;
    border-radius: 50%;
    position: absolute;
    top: 50px;
    left: 18px;
    
            border: black solid ;
        }

      .Smile{

    width: 200px;
    height: 36px;
    top: 125px;
    left: 38px;
    border: 3px solid;
    position: absolute;
    border-top-color: #000000;
    border-top: none;
    border-radius: 0 0 100px 100px;
}
        

        .LeftArm{
    width: 50px;
    height: 94px;
    background-color: #2e6dec;
    border-radius: 50%;
    position: absolute;
    top: 273px;
    left: -27px;
    border: black solid;
}
        .RightArm{
    width: 50px;
    height: 100px;
    background-color: #2e6dec;
    border-radius: 50%;
    position: absolute;
    top: 270px;
    left: 258px;
    border: black solid;
}

        .LeftHand{
    width: 50px;
    height: 50px;
    background-color: white;
    border-radius: 50%;
    position: absolute;
    
    top: 340px;
    left: -25px;
    border: black solid;
}

        .RightHand{
    width: 50px;
    height: 50px;
    background-color: white;
    border-radius: 50%;
    position: absolute;
    top: 340px;
    left: 259px;
    border: black solid;
}

        .Body{
    
    width: 248px;
    position: absolute;
    
    top: 243px;
    border-radius: 50px;
    height: 286px;
    left: 17px;
    background-color: #2e6dec;
    border: black solid;
}
        .Collar{
    
    
    width: 248px;
    height: 22px;
    background-color: red;
    position: absolute;
    top: 242px;
    left: 13px;
    border-radius: 11px;
border: black solid ;

        }
        .Belly{
    
    width: 190px;
    height: 190px;
    background-color: white;
    position: absolute;
    top: 267px;
    left: 50px;
    border-radius: 50%;
    border: black solid;
}

        .Bell{
            
    width: 45px;
    height: 45px;
    background-color: #f0c419;
    border-radius: 50%;
    position: absolute;  
    top: 250px;
    left: 117px;
    border: black solid;
}

        .Pocket{
    
    width: 130px;
    height: 70px;
    background-color: white;
    border-radius: 50%;
    position: absolute;
    border-bottom-left-radius: 72px;
    border-bottom-right-radius: 72px;
    top: 363px;
    left: 80px;
    border: black solid;
}



        
        </style>
</head>

<body>
    
    <div class="Doremon">
        
        <div class="Face"></div>
        <div class="WhiteFace"></div>
        <div class="LeftEyes"></div>
        <div class="RightEyes"></div>
        <div class="Nose"></div>

        <div class="Smile"> </div>



        <div class="LeftArm"></div>
        <div class="RightArm"></div>
        <div class="LeftHand"></div>
        <div class="RightHand"></div>
    
        <div class="Body"></div>
        <div class="Collar"></div>
        <div class= " Belly"></div>
        <div class=" Pocket"></div>
        <div class="Bell"></div>


    </div>
</body>
</html>

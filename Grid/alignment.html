<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing my Name First letter using my Grid</title>
    <style>
        .container{
            margin: auto;
            width: 800px;
            height: 800px;
            display: grid;
            grid-template-columns: 250px 250px 250px;
            grid-template-rows: 200px 200px 200px;
        }
        .box1{
            background-color: rgb(101, 101, 255);
            border: 2px solid black;
            width: 50px;
            height: 50px;
            align-self: end;
        }
        .box2{
            background-color: rgb(101, 101, 255);
            border: 2px solid black;
            width: 50px;
            height: 50px;
            align-self: end;
            justify-self: center;
        }
        .box3{
            background-color: rgb(101, 101, 255);
            border: 2px solid black;
            width: 50px;
            height: 50px;
            align-self: start;
            justify-self: end;
        }
        .box4{
            background-color: rgb(101, 101, 255);
            border: 2px solid black;
            width: 50px;
            height: 50px;
            align-self: anchor-center;
        }
        .box5{
            background-color: rgb(101, 101, 255);
            border: 2px solid black;
            width: 50px;
            height: 50px;
            align-self: center;
            justify-self: anchor-center;
        }
        .box6{
            background-color: rgb(101, 101, 255);
            border: 2px solid black;
            width: 50px;
            height: 50px;
            align-self: anchor-center;
            justify-self: flex-end;
        }
        .box7{
            background-color: rgb(101, 101, 255);
            border: 2px solid black;
            width: 50px;
            height: 50px; 
            align-self: end;
        }
        .box8{
            background-color: rgb(101, 101, 255);
            border: 2px solid black;
            width: 50px;
            height: 50px;
        justify-self: anchor-center;
        }
        .box9{
            background-color: rgb(101, 101, 255);
            border: 2px solid black;
            width: 50px;
            height: 50px;
            align-self: end;
            justify-self: end;
        }
        
</style>
</head>

<body>
    

    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
        <div class="box6"></div>
        <div class="box7"></div>
        <div class="box8"></div>
        <div class="box9"></div>
    </div>


</body>
</html>

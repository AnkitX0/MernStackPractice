<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .container{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 10px;
            height: 100vh;
        }
        .box1{
            background-color: #35206d;
            height: 100%;
            width: 100%;
            grid-column: 1 / 2;
            grid-row: 1 / 7;
            color: white;
        }
        .box2{
            background-color: #20a2a6;
            height: 100%;
            width: 100%;
            grid-column: 2/5;
            grid-row: 1/2;
            color: white;
        }
        .box3{
            background-color: #1160c6;
            height: 100%;
            width: 100%;
            grid-column: 2/3;
            grid-row: 2/3;
            color: white;
        }
        .box4{
            background-color: #14b283;
            height: 100%;
            width: 100%;
            grid-column: 3/4;
            grid-row: 2/3;
            color: white;
        }
        .box5{
            background-color: #b45812;
            height: 100%;
            width: 100%;
            grid-column: 4/5;
            grid-row: 2/3;
            color: white;
        }
        .box6{
            background-color: #730ecb;
            height: 100%;
            width: 100%;
            grid-column: 2/4;
            grid-row: 3/5;
            color: white;
        }
        .box7{
            background-color: #8b086f;
            height: 100%;
            width: 100%;
            grid-column: 4/5;
            grid-row: 3/5;
            color: white;
        }
        .box8{
            background-color: #1160c6;
            height: 100%;
            width: 100%;
            grid-column: 2/3;
            grid-row: 5/7;
            color: white;
        }
        .box9{
            background-color: #1160c6;
            height: 100%;
            width: 100%;
            grid-column: 3/4;
            grid-row: 5/7;
            color: white;
        }
        .box10{
            background-color: #1160c6;
            height: 100%;
            width: 100%;
            grid-column: 4/5;
            grid-row: 5/7;
            color: white;
        }

    </style>

</head>
<body>
    <div class="container">
        <div class="box1">Sidebar</div>
        <div class="box2">Top navigation</div>
        <div class="box3">Users
            <div><p>12,450</p></div>
        </div>
        <div class="box4">Revenue
            <div><p>$24,800</p></div>
        </div>
        <div class="box5">Orders
            <div><p>1,234</p></div>
        </div>
        <div class="box6">Chart</div>
        <div class="box7">Table</div>
        <div class="box8">Widget1</div>
        <div class="box9">Widget2</div>
        <div class="box10">Widget3</div>
    </div>
</body>
</html>

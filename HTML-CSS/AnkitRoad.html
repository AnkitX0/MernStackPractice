<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Road</title>

    <style>
        .Road{
            width: 200px;
            height: 400px;
            position: relative;
            margin: 50px auto;
            background-color: black;
        }   

        .RoadLine1{
                margin-top: 10px;
                margin-left: 100px;
            width: 10px;
            height: 50px;
            background-color: white;
            position: absolute;
            top: 0px;
        }
        .RoadLine2{
            margin-left: 100px;
            width: 10px;
            height: 50px;
            background-color: white;
            position: absolute;
            top: 100px;
        }
        .RoadLine3{
            margin-left: 100px;
            width: 10px;
            height: 50px;
            background-color: white;
            position: absolute;
            top: 200px;
        }
        .RoadLine4{
            margin-left: 100px;
            width: 10px;
            height: 50px;
            background-color: white;
            position: absolute;
            top: 300px;
        }
        .RoadLine5{
            margin-left: 100px;
            width: 10px;
            height: 50px;
            background-color: white;
            position: absolute;
            top: 400px;
        }
        .RoadLine6{
            margin-left: 100px;
            width: 10px;
            height: 50px;
            background-color: white;
            position: absolute;
            top: 500px;
        }
    </style>

</head>
<body>
    
    <div class="Road">
        <div class="RoadLine1"></div>
        <div class="RoadLine2"></div>
        <div class="RoadLine3"></div>
        <div class="RoadLine4"></div>
        <div class="RoadLine5"></div>
        <div class="RoadLine6"></div>

    </div>
</body>
</html>

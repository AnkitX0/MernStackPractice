<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DivBox</title>

    <style>
        .Header{
            width: 100%;
            height: 100px;
            border: 2px solid black;
            background-color: rgb(196, 60, 60);
        }

        .Navigation{
            width: 100%;
            height: 50px;
            border: 2px solid black;
            background-color: rgb(183, 185, 56);
        }

        .Main{
            width: 60%;
            margin: 2%;
            height: 300px;
            border: 2px solid black;
            background-color: rgb(89, 180, 223);
            

            display: inline-block;
        }

        .Article{
            margin: 2%;
            width: 50%;
            height: 80%;
            border: 2px solid black;
            background-color: rgb(40, 111, 218);
            display: inline-block;
        }

        .Section{
            margin: 2%;
            width: 35%;
            height: 80%;
            display: inline-block;
            border: 2px solid black;
            background-color: rgb(84, 114, 212);

        }

        .Aside{
            margin: 2%;
            width: 30%;
            height: 282px;
            border: 2px solid black;
            display: inline-block;
            background-color: rgb(93, 233, 81);
        }

        .footer{
            width: 100%;
            height: 50px;
            border: 2px solid black;
            background-color: rgb(151, 31, 31);
        }
    </style>

</head>
<body>

    <div class = "Header"> Header </div>
    
    <div class = "Navigation"> Navigation </div>
    
    <div class = "Main">
        <div class = "Article"> Article     </div>
        <section class = "Section"> Section </section>
    </div>
    
    <div class = "Aside"> Aside </div>

    <div class="footer">
        <p>Footer</p>
    </div>

</body>
</html>

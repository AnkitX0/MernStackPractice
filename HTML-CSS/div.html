<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Design</title>

  <style>

    body{
      font-family: Arial, sans-serif;
    }

    .container{
      width: 50%;
      border: 2px solid black;
      padding: 20px;
      background-color: lightyellow;
      margin-bottom: 40px;
    }

    .top-box{
      width: 100%;
      height: 120px;
      border: 2px solid black;
      background-color: skyblue;

      display: flex;
      justify-content: space-evenly;
      align-items: center;
    }

    .small-box{
      width: 13%;
      height: 80px;
      border: 2px solid black;
      background-color: red;
    }

    .circle{
      border-radius: 50%;
    }

    .middle{
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .left-box{
      width: 15%;
      height: 100px;
      border: 2px solid black;
      background-color: lightcoral;
    }

    .right-box{
      width: 75%;
      height: 100px;
      border: 2px solid black;
      background-color: lightgreen;
    }

  </style>
</head>

<body>

  <!-- First Layout -->
  <div class="container">

    <div class="top-box">
      <div class="small-box"></div>
      <div class="small-box"></div>
      <div class="small-box"></div>
      <div class="small-box"></div>
    </div>

    <div class="middle">
      <div class="right-box"></div>
      <div class="left-box"></div>
    </div>

  </div>


  <!-- Second Layout -->
  <div class="container">

    <div class="middle">
      <div class="left-box"></div>
      <div class="right-box"></div>
    </div>

    <div class="top-box" style="margin-top:20px;">
      <div class="small-box circle"></div>
      <div class="small-box"></div>
      <div class="small-box circle"></div>
      <div class="small-box"></div>
    </div>

    <div class="middle">
      <div class="right-box"></div>
      <div class="left-box"></div>
    </div>

  </div>

</body>
</html>

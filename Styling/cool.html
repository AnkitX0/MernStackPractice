<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car vs Footpath</title>

<style>
body{
    overflow:hidden;
    position:relative;
    height:100vh;
}

/* Car */
.car{
    position:absolute;
    width:250px;
    left:-250px;
    top:200px;
    transform: scaleX(-1);
    animation: drive 5s linear forwards;

    z-index: 2; 
}

.footpath{
    position:absolute;
    width:200px;
    left:800px;
    top:150px;
    transform: rotate(90deg);
    transition: transform 0.6s ease;

    z-index: 1; 
}

.flip{
    transform: rotateY(180deg);
}

@keyframes drive{
    from{
        left:-250px;
    }
    to{
        left:1000px;
    }
}
</style>
</head>

<body>

<img src="files/salman-khan-salman-driving.png" class="car" id="car">
<img src="files/footpath.webp" class="footpath" id="footpath">





<script>
const car = document.getElementById("car");
const footpath = document.getElementById("footpath");

let flipped = false;

function checkCollision() {
    const carRect = car.getBoundingClientRect();
    const footRect = footpath.getBoundingClientRect();

    // Middle of footpath
    const footMiddle = footRect.left + footRect.width / 2;

    // Front of car
    const carFront = carRect.right;

    if (carFront >= footMiddle && !flipped) {
        footpath.classList.add("flip");
        flipped = true;
    }

    requestAnimationFrame(checkCollision);
}

checkCollision();
</script>

</body>
</html>

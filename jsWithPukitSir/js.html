<!DOCTYPE html>
<html>
<head>
    <title>Even or Odd</title>
</head>
<body>
    <script>

        for(let i = 0; i < 5; i++){
            let row= ""
            for(let j = i; j <= i; j++){
                row += "* "
            }
            console.log(row);
        }

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Physical Form</title>
</head>
<body>
    <h2>Sports Physical Form</h2>
    <h3>Athlete Information</h3>
    <ul>    
        <label for="Name">Name:</label>
        <input type="text" id="Name" name="Name">

        <label for="School"> School/Team</label>
        <input type="text" id="School" name="School">
        
        Sports: <input type="text" id="Sports" name="Sports">

        parents/Guardian Name: <input type="text" id="GuardianName" name="GuardianName">
        Contact Number: <input type="text" id="ContactNumber" name="ContactNumber">
    </ul>
</body>
</html>
